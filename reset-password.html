<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>FitCheck - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="reset-password.html" id="header-title" class="auth-logo logo"></a>
            <p class="auth-subtitle">Reset your password</p>

            <p class="form-note">Enter the email tied to your account and we'll send a link to reset your password.</p>

            <form id="reset-form">
                <div class="form-group">
                    <label class="form-label" for="reset-email">Email</label>
                    <input class="form-input" type="email" id="reset-email" name="email" placeholder="you@email.com" required>
                </div>

                <button type="submit" class="form-submit">Send reset link</button>
            </form>

            <p class="form-footer">Remember it? <a href="login.html">Back to log in</a></p>
        </div>
    </div>
    
</body>
</html>
