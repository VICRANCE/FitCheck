<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>FitCheck - notifications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="app-header">
    <div class="header-inner">
        <div class="header-top">
            <a href="profile.html" id="header-title" class="logo">
                <img src="images/FCL.png" alt="FitCheck-logo" width="200">
            </a>
            <h1 class="logo">Notifications</h1>
        </div>
    </div>
</header>

<main>
    <section class="page">

        <div class="notif-row">
            <div class="avatar">DJ</div>
            <div class="notif-icon">&#128293</div>
            <div class="notif-text"><strong>Deji</strong> <span>sent it on your fit check</span></div>
            <div class="notif-meta">
                <span class="notif-time">10m</span>
                <span class="notif-dot"></span>
            </div>
        </div>

        <div class="notif-row">
            <div class="avatar">ST</div>
            <div class="notif-icon">&#128172</div>
            <div class="notif-text"><strong>Stylist - Lade</strong> <span>commented: "Swap the tie for a silk scarf"</span></div>
            <div class="notif-meta">
                <span class="notif-time">1h</span>
                <span class="notif-dot"></span>
            </div>
        </div>

        <div class="notif-row">
            <div class="avatar">PR</div>
            <div class="notif-icon follow">+</div>
            <div class="notif-text"><strong>Priya</strong> <span>started following you</span></div>
            <div class="notif-meta">
                <span class="notif-time">3h</span>
                <span class="notif-dot"></span>
            </div>
        </div>

        <div class="notif-row">
            <div class="avatar">KJ</div>
            <div class="notif-icon">&#10024</div>
            <div class="notif-text"><strong>Kenji</strong> <span>loved your fit check</span></div>
            <div class="notif-meta">
                <span class="notif-time">5h</span>
            </div>
        </div>

        <div class="notif-row">
            <div class="avatar">AM</div>
            <div class="notif-icon">&#128172</div>
            <div class="notif-text"><strong>Amara</strong> <span>commented: "This is giving main character energy"</span></div>
            <div class="notif-meta">
                <span class="notif-time">1d</span>
            </div>
        </div>
    </section>
</main>

<button id="fab" aria-label="New fit check">+</button>

<nav id="bottom-nav">
    <a href="home.html" class="nav-btn">
        <span class="nav-icon">&#8962</span>
        <span class="nav-label">Home</span>
    </a>
    <a href="notification.html" class="nav-btn active">
        <span class="nav-icon">&#128276</span>
        <span class="nav-badge"></span>
        <span class="nav-label">Alerts</span>
    </a>
    <a href="profile.html" class="nav-btn">
        <span class="nav-icon">&#128100</span>
        <span class="nav-label">Profile</span>
    </a>
</nav>

</body>
</html>
