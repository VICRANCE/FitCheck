<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>FitCheck - Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <a href="signup.html" id="header-title" class="auth-logo logo"></a>
        <p class="auth-subtitle">Create your account.</p>


        <form id="signup-form">
            <div class="form-group">
                <label class="form-label" for="signup-name">Name</label>
                <input class="form-input" type="text" id="signup-name" name="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="signup-email">Email</label>
                <input class="form-input" type="email" id="signup-email" name="email" placeholder="you@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="signup-password">Password</label>
                <input class="form-input" type="password" id="signup-password" name="password" placeholder="**********" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="signup-confirm">Confirm password</label>
                <input class="form-input" type="password" id="signup-confirm" name="confirmPassword" placeholder="**********" required>
            </div>

            <button type="submit" class="form-submit">Create account</button>
        </form>

        <p class="form-footer">Already have an account? <a href="login.html">Log in</a></p>
    </div>
</div>

</body>
</html>
